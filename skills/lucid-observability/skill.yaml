lucid: "1.0"
name: lucid-observability
version: "5.0.0"
description: "Production observability intelligence — incident triage, severity scoring, temporal pattern detection, production readiness checks, and outbox health analysis"
author: "Lucid Foundation"
license: "MIT"

requires:
  mcps:
    - sentry
    - supabase
  env:
    - SENTRY_AUTH_TOKEN
    - SENTRY_ORG

skills:
  - triage
  - incident-response
  - correlation
  - billing-health
  - conventions
  - production-readiness
  - alerting

heartbeat: HEARTBEAT.md

entry:
  mcp: dist/mcp.js
  openclaw: dist/openclaw.js
  bin: dist/bin.js

tools:
  - lucid_triage
  - lucid_readiness
  - lucid_outbox_health
  - lucid_diagnose
  - lucid_obs_pro

platforms:
  claude-code: true
  openclaw: true
