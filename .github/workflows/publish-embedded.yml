name: Publish @lucid-fdn/plugins-embedded

on:
  push:
    branches: [main]
    paths:
      - 'packages/embedded/**'
      - 'lucid-*/plugin/src/**'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build all plugins
        run: |
          for dir in lucid-*/plugin/; do
            if [ -f "$dir/tsup.config.ts" ]; then
              echo "Building $(basename $(dirname $dir))..."
              (cd "$dir" && npx tsup 2>&1 | tail -1)
            fi
          done

      - name: Build embedded bundle
        working-directory: packages/embedded
        run: npm run build

      - name: Check if publish needed
        id: check
        working-directory: packages/embedded
        run: |
          LOCAL=$(node -e "import('./package.json',{with:{type:'json'}}).then(m=>console.log(m.default.version))")
          REMOTE=$(npm view @lucid-fdn/plugins-embedded version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "remote=$REMOTE" >> $GITHUB_OUTPUT
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "publish=false" >> $GITHUB_OUTPUT
            echo "Version $LOCAL already published — bumping patch"
            npm version patch --no-git-tag-version
            echo "bumped=$(node -e "import('./package.json',{with:{type:'json'}}).then(m=>console.log(m.default.version))")" >> $GITHUB_OUTPUT
          else
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

      - name: Update VERSION constant
        if: steps.check.outputs.bumped != ''
        working-directory: packages/embedded
        run: |
          VER="${{ steps.check.outputs.bumped }}"
          sed -i "s/export const VERSION = '.*'/export const VERSION = '$VER'/" src/index.ts
          npm run build

      - name: Publish to npm
        working-directory: packages/embedded
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Commit version bump
        if: steps.check.outputs.bumped != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/embedded/package.json packages/embedded/src/index.ts
          git commit -m "chore: bump @lucid-fdn/plugins-embedded to ${{ steps.check.outputs.bumped }} [skip ci]"
          git push
