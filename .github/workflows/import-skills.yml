name: Import Skills to Catalog

on:
  push:
    branches: [main]
    paths:
      - '*/skill/SKILL.md'
      - '*/skill/references/**'

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: npm install @supabase/supabase-js

      - name: Find changed skills
        id: changed
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- '*/skill/SKILL.md' '*/skill/references/' | \
            sed 's|/skill/.*||' | sort -u)
          echo "skills<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Changed: $CHANGED"

      - name: Import changed skills
        if: steps.changed.outputs.skills != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "${{ steps.changed.outputs.skills }}" | while read -r feature; do
            [ -z "$feature" ] && continue
            echo "Importing: $feature"
            node scripts/ci-import-skill.mjs "$feature"
          done
